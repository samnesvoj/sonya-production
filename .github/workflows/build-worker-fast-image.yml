name: Build SONYA fast worker image

# Triggers when the fast image sources change.
# The :latest image is built by build-worker-image.yml — this workflow is independent.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "deploy/docker/Dockerfile.worker.fast"
      - "deploy/docker/requirements-worker-fast.txt"
      - "deploy/docker/worker_entrypoint.sh"
      - "scripts/**"
      - "modes/**"
      - "configs/**"

permissions:
  contents: read
  packages: write

jobs:
  build-fast-worker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tags
        run: |
          echo "TAG_FAST=ghcr.io/samnesvoj/sonya-worker:fast" >> $GITHUB_ENV
          echo "TAG_SHA=ghcr.io/samnesvoj/sonya-worker:fast-${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Build and push sonya-worker:fast
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.worker.fast
          push: true
          tags: |
            ${{ env.TAG_FAST }}
            ${{ env.TAG_SHA }}
          cache-from: type=gha,scope=fast-worker
          cache-to: type=gha,scope=fast-worker,mode=max
